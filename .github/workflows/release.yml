# Phase 7.5.H — Tag-triggered cross-platform release pipeline.
#
# Triggered by pushing a `v*` tag (e.g. `git tag v0.2.0 && git push --tags`).
# Builds the Tauri binary on a 4-job matrix:
#   - windows-latest   → .msi + .exe (NSIS)
#   - macos-latest     → .dmg + .app (Apple Silicon)
#   - macos-13         → .dmg + .app (Intel)
#   - ubuntu-22.04     → .AppImage + .deb
#
# `tauri-apps/tauri-action@v0` orchestrates the build, generates the
# `latest.json` updater manifest (because tauri.conf.json sets
# `bundle.createUpdaterArtifacts: true`), and uploads every artefact to a
# GitHub Release matching the tag.
#
# Required GitHub Secrets (set under Settings → Secrets and variables):
#   - TAURI_SIGNING_PRIVATE_KEY          (the keypair from `npx tauri signer generate`)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD (the passphrase you set during generate)
#
# The matching public key lives in `src-tauri/tauri.conf.json` under
# `plugins.updater.pubkey` — replace the placeholder once you generate
# the keypair.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"  # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: "macos-13"      # Intel
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Cache Rust target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build & publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Teach Me Everything ${{ github.ref_name }}"
          releaseBody: |
            See the [commit history](https://github.com/FurkanSahinnn/teach-me-everything/commits/main) for changes.

            ### Install
            - **macOS:** download the `.dmg` for your chip (Apple Silicon = `aarch64`, Intel = `x86_64`).
            - **Windows:** download the `.msi`.
            - **Linux:** download the `.AppImage` or `.deb`.

            Updates are delivered in-app once installed — open Settings → About → Updates.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
