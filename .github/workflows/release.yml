# Tag-triggered cross-platform Tauri release.
#
# Push a `v*` tag (e.g. `git tag v1.0.0 && git push --tags`) to build the
# desktop binaries on all platforms and publish a draft GitHub Release.
#
# Required GitHub Secrets:
#   - TAURI_SIGNING_PRIVATE_KEY          (from `npx tauri signer generate`)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD (the passphrase set during generate)
# The matching public key lives in src-tauri/tauri.conf.json (plugins.updater.pubkey).

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Teach Me Everything ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform from the assets below. Updates are delivered in-app once installed."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
